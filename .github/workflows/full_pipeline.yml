name: Full CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      app_server_ip: ${{ steps.export_ip.outputs.app_server_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        run: |
          sudo apt-get update && sudo apt-get install -y terraform

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: terraform init && terraform apply -auto-approve

      - name: Export instance IP
        id: export_ip
        working-directory: ./terraform
        run: echo "app_server_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

  ansible:
    runs-on: ubuntu-latest
    needs: terraform
    env:
      APP_SERVER_IP: ${{ needs.terraform.outputs.app_server_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: ./ansible
        run: ansible-playbook playbooks/install_docker.yml -i inventory/terraform_inventory.py --limit $APP_SERVER_IP

  app:
    runs-on: ubuntu-latest
    needs: ansible
    env:
      APP_SERVER_IP: ${{ needs.terraform.outputs.app_server_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_SSH_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@$APP_SERVER_IP << 'EOF'
          cd /home/ubuntu/Basic-nodejs-app
          git pull origin master
          docker-compose down
          docker-compose up -d --build
          EOF
